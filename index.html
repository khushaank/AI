    <!-- Main Container -->
    <div class="main-layout">
      <header class="clean-header">
        <div class="logo">Khushaank AI</div>
        <button class="settings-btn" id="settings-toggle">
          <i class="ri-settings-line"></i>
        </button>
      </header>

      <section class="content-wrapper">
        <h1 class="main-title">Think forward.</h1>
        <p class="main-subtitle">AI-powered strategy for your next big move.</p>

        <!-- Search/Input Box -->
        <div class="input-container">
          <form id="guidance-form">
            <div class="input-box glass-card">
              <textarea
                id="goal"
                placeholder="What is your next goal?"
                required
              ></textarea>

              <div class="secondary-inputs">
                <input
                  type="text"
                  id="skills"
                  placeholder="Skills (e.g. Design, Coding)"
                />
                <select id="time">
                  <option value="1-2 hours/day">1-2 hours/day</option>
                  <option value="Half-time">Half-time</option>
                  <option value="Full-time">Full-time</option>
                </select>
              </div>

              <!-- Context hidden/expandable if needed, or just included -->
              <textarea
                id="context"
                class="context-input"
                placeholder="Additional context (optional)..."
              ></textarea>

              <div class="action-row">
                <button type="submit" id="generate-btn" class="generate-btn">
                  <span class="btn-text">Generate Plan</span>
                  <span class="loader hidden"></span>
                </button>
              </div>
            </div>

            <!-- Hidden API Key -->
            <div id="api-settings" class="api-popup hidden">
              <label>Enter Gemini API Key</label>
              <input type="password" id="api-key" placeholder="API Key" />
              <button type="button" id="save-key-btn">Save</button>
            </div>
          </form>
        </div>

        <!-- Result Output -->
        <div id="output-section" class="output-container hidden">
          <div id="result-content" class="markdown-body"></div>
          <button class="close-btn" onclick="closeResult()">Close</button>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
