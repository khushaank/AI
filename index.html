<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Khushaank AI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        bgMain: "#212121",
                        bgSide: "#171717",
                        bgInput: "#2f2f2f",
                        bgInputFocus: "#383838"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-bgMain text-gray-100 flex h-screen overflow-hidden antialiased">
    <!-- Left Sidebar -->
    <aside
        class="w-[260px] bg-bgSide flex-shrink-0 flex flex-col h-full transition-all border-r border-white/5 hidden md:flex">
        <div class="p-3">
            <button onclick="resetView()"
                class="w-full flex items-center gap-2 hover:bg-white/5 p-2 rounded-lg text-sm transition-colors text-gray-200">
                <div class="w-7 h-7 rounded-full bg-white flex items-center justify-center text-black">
                    <span class="material-symbols-outlined text-[16px]">psychology</span>
                </div>
                <span class="font-medium">New chat</span>
                <span class="material-symbols-outlined text-[18px] ml-auto text-gray-400">edit_square</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-2 custom-scrollbar">
            <div class="text-xs font-semibold text-gray-500 mb-3 px-2">History</div>
            <ul id="history-list" class="flex flex-col gap-1">
                <li class="text-sm text-gray-500 italic px-2">No history yet.</li>
            </ul>
        </div>

        <div class="p-3 mt-auto border-t border-white/10">
            <button
                class="w-full flex items-center gap-3 hover:bg-white/5 p-2 rounded-lg text-sm transition-colors text-gray-200">
                <div
                    class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-[11px] font-bold text-white">
                    KG</div>
                <span class="font-medium">Khushaank</span>
            </button>
        </div>
    </aside>

    <!-- Main Area -->
    <main class="flex-1 flex flex-col relative h-full">
        <!-- Top bar -->
        <header class="h-14 flex items-center px-4 justify-between">
            <div class="font-semibold text-lg text-gray-300 flex items-center cursor-pointer hover:text-gray-100"
                onclick="resetView()">
                phi4-mini-listing<span class="text-gray-500 text-sm ml-1 material-symbols-outlined">expand_more</span>
            </div>
            <div class="flex gap-3">
                <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 text-gray-400">
                    <span class="material-symbols-outlined text-[20px]">person_add</span>
                </button>
                <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 text-gray-400">
                    <span class="material-symbols-outlined text-[20px]">more_horiz</span>
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col items-center pb-32" id="chat-scroll">

            <!-- Welcome View -->
            <div id="welcome-view" class="w-full flex-1 flex flex-col items-center justify-center min-h-[50vh]">
                <h1 class="text-3xl font-semibold mb-8 text-white tracking-wide">Good to see you, Khushaank.</h1>
            </div>

            <!-- Output View -->
            <div id="output-panel" class="w-full max-w-3xl hidden flex-col px-4 py-6">
                <!-- User Message -->
                <div class="flex justify-end mb-8">
                    <div class="bg-[#2f2f2f] px-5 py-3 rounded-3xl max-w-[70%] text-gray-100 text-[15px] leading-relaxed"
                        id="user-msg-display">
                        <!-- User text -->
                    </div>
                </div>

                <!-- AI Response -->
                <div class="flex gap-4 mb-6">
                    <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center flex-shrink-0 mt-1">
                        <span class="material-symbols-outlined text-[18px] text-black">psychology</span>
                    </div>
                    <div class="flex-1 w-full min-w-0">
                        <!-- Result Content -->
                        <div id="result-content"
                            class="prose prose-invert max-w-none text-gray-200 text-[15px] leading-relaxed">
                        </div>

                        <!-- Action Buttons (Bottom) -->
                        <div id="action-buttons" class="hidden flex items-center gap-2 mt-4 text-gray-400">
                            <button id="copy-btn"
                                class="p-1.5 rounded-md hover:bg-white/10 hover:text-white transition-colors flex items-center"
                                title="Copy">
                                <span class="material-symbols-outlined text-[18px]">content_copy</span>
                            </button>
                            <button id="share-btn"
                                class="p-1.5 rounded-md hover:bg-white/10 hover:text-white transition-colors flex items-center"
                                title="Share">
                                <span class="material-symbols-outlined text-[18px]">ios_share</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Input Area -->
        <div
            class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-bgMain via-bgMain to-transparent pt-8 pb-6 px-4">
            <div class="max-w-3xl mx-auto w-full relative">
                <form id="chat-form"
                    class="relative flex items-center bg-bgInput rounded-[26px] shadow-lg px-3 py-2 focus-within:bg-bgInputFocus transition-colors">
                    <button type="button"
                        class="p-2 text-gray-400 hover:text-white transition-colors flex items-center justify-center rounded-full hover:bg-white/10">
                        <span class="material-symbols-outlined text-[24px]">add</span>
                    </button>
                    <input id="chat-input" type="text" placeholder="Ask anything..."
                        class="flex-1 bg-transparent border-none focus:ring-0 text-white placeholder-gray-500 px-3 py-3 text-[15px]"
                        autocomplete="off" />

                    <button type="button" id="mic-btn"
                        class="p-2 text-gray-400 hover:text-white transition-colors flex items-center justify-center rounded-full hover:bg-white/10">
                        <span class="material-symbols-outlined text-[20px]">mic</span>
                    </button>

                    <button type="submit" id="send-btn"
                        class="ml-2 w-9 h-9 rounded-full bg-white text-black flex items-center justify-center hover:bg-gray-200 transition-colors disabled:opacity-50 disabled:bg-gray-600 disabled:text-gray-400">
                        <span class="material-symbols-outlined send-icon text-[20px] font-bold">arrow_upward</span>
                        <span
                            class="loader hidden w-4 h-4 border-2 border-black/30 border-t-black rounded-full animate-spin"></span>
                    </button>
                </form>
                <div class="text-center text-[12px] text-gray-500 mt-3">
                    Khushaank AI can make mistakes. Check important info.
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
